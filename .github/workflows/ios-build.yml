name: Build iOS IPA

on:
  workflow_dispatch:
  push:
    branches:
      - main

env:
  IOS_BUNDLE_ID: com.leo.notsouglydragon
  XCODE_PROJECT: ios-build/notsouglydragon_v1.xcodeproj
  ARCHIVE_PATH: build/DragonJump.xcarchive
  IPA_EXPORT_PATH: build/ipa

jobs:
  build-ios:
    name: Build iOS IPA
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Import Apple signing assets
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_PROVISIONING_PROFILE_BASE64: ${{ secrets.APPLE_PROVISIONING_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          IOS_BUNDLE_ID: ${{ env.IOS_BUNDLE_ID }}
        run: |
          set -euo pipefail
          CERTIFICATE_PATH="$RUNNER_TEMP/apple_development.p12"
          PROFILE_PATH="$RUNNER_TEMP/profile.mobileprovision"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

          echo "$APPLE_CERTIFICATE_BASE64" | base64 --decode > "$CERTIFICATE_PATH"
          echo "$APPLE_PROVISIONING_PROFILE_BASE64" | base64 --decode > "$PROFILE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          security cms -D -i "$PROFILE_PATH" > "$RUNNER_TEMP/profile.plist"
          PROFILE_UUID="$(/usr/libexec/PlistBuddy -c 'Print UUID' "$RUNNER_TEMP/profile.plist")"
          PROFILE_NAME="$(/usr/libexec/PlistBuddy -c 'Print Name' "$RUNNER_TEMP/profile.plist")"
          PROFILE_TEAM_ID="$(/usr/libexec/PlistBuddy -c 'Print TeamIdentifier:0' "$RUNNER_TEMP/profile.plist")"
          PROFILE_APP_ID="$(/usr/libexec/PlistBuddy -c 'Print Entitlements:application-identifier' "$RUNNER_TEMP/profile.plist")"
          cp "$PROFILE_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/$PROFILE_UUID.mobileprovision"

          if [ "$PROFILE_TEAM_ID" != "$APPLE_TEAM_ID" ]; then
            echo "Provisioning profile team '$PROFILE_TEAM_ID' does not match APPLE_TEAM_ID '$APPLE_TEAM_ID'"
            exit 1
          fi

          if [ "$PROFILE_APP_ID" != "$APPLE_TEAM_ID.$IOS_BUNDLE_ID" ] && [ "$PROFILE_APP_ID" != "$APPLE_TEAM_ID.*" ]; then
            echo "Provisioning profile app id '$PROFILE_APP_ID' does not match '$APPLE_TEAM_ID.$IOS_BUNDLE_ID' or '$APPLE_TEAM_ID.*'"
            exit 1
          fi

          echo "PROFILE_UUID=$PROFILE_UUID" >> "$GITHUB_ENV"
          echo "PROFILE_NAME=$PROFILE_NAME" >> "$GITHUB_ENV"
          echo "Installed provisioning profile: $PROFILE_NAME ($PROFILE_UUID)"

      - name: Build IPA with Xcode
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euxo pipefail
          mkdir -p build "$IPA_EXPORT_PATH"

          xcodebuild -version
          xcodebuild -showsdks
          xcodebuild -list -project "$XCODE_PROJECT"

          SCHEME="$(xcodebuild -list -project "$XCODE_PROJECT" | awk '/Schemes:/{getline; gsub(/^[ \t]+|[ \t]+$/, ""); print; exit}')"
          if [ -z "$SCHEME" ]; then
            echo "No Xcode scheme found in $XCODE_PROJECT"
            xcodebuild -list -project "$XCODE_PROJECT"
            exit 1
          fi
          echo "Using Xcode scheme: $SCHEME"

          xcodebuild -showBuildSettings \
            -project "$XCODE_PROJECT" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Development" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            PROVISIONING_PROFILE="$PROFILE_UUID" \
            PROVISIONING_PROFILE_SPECIFIER="$PROFILE_NAME" \
            PRODUCT_BUNDLE_IDENTIFIER="$IOS_BUNDLE_ID"

          set +e
          xcodebuild -verbose archive \
            -project "$XCODE_PROJECT" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -archivePath "$ARCHIVE_PATH" \
            -destination "generic/platform=iOS" \
            -allowProvisioningUpdates \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Development" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            PROVISIONING_PROFILE="$PROFILE_UUID" \
            PROVISIONING_PROFILE_SPECIFIER="$PROFILE_NAME" \
            PRODUCT_BUNDLE_IDENTIFIER="$IOS_BUNDLE_ID" \
            2>&1 | tee "$RUNNER_TEMP/xcodebuild-archive.log"
          ARCHIVE_STATUS="${PIPESTATUS[0]}"
          set -e
          if [ "$ARCHIVE_STATUS" -ne 0 ]; then
            echo "xcodebuild archive failed with exit code $ARCHIVE_STATUS"
            exit "$ARCHIVE_STATUS"
          fi

          cat > "$RUNNER_TEMP/ExportOptions.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>development</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>teamID</key>
            <string>$APPLE_TEAM_ID</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>$IOS_BUNDLE_ID</key>
              <string>$PROFILE_UUID</string>
            </dict>
            <key>compileBitcode</key>
            <false/>
          </dict>
          </plist>
          EOF

          cat "$RUNNER_TEMP/ExportOptions.plist"

          set +e
          xcodebuild -verbose -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath "$IPA_EXPORT_PATH" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            2>&1 | tee "$RUNNER_TEMP/xcodebuild-export.log"
          EXPORT_STATUS="${PIPESTATUS[0]}"
          set -e
          if [ "$EXPORT_STATUS" -ne 0 ]; then
            echo "xcodebuild -exportArchive failed with exit code $EXPORT_STATUS"
            exit "$EXPORT_STATUS"
          fi

          ls -lah "$IPA_EXPORT_PATH"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: dragon-jump-ios-ipa
          path: build/ipa/*.ipa
          if-no-files-found: error
